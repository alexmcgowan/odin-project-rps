<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <script src="logic.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Rock Paper Scissors</h1>
    </header>
    
    <div class = "main-holder">

        <div class = "secondary-holder">
            <div class="horiz">
                <div>
                    <div class = "choice" id ="plrMove">❔</div>
                    <p class = "plr" id="plr-score">Player:</p>
                </div>
                <div>
                    <div class = "choice" id ="compMove">❔</div>
                    <p class = "plr" id="comp-score">Computer:</p>
                </div>
            <div>

            </div>
        </div>

        <div class="horiz btn-holder">
            <button class = "btn" id = "rock">🪨</button>
            <button class = "btn" id = "paper">📃</button>
            <button class = "btn" id = "scissors">✂️</button>
        </div>
    </div>

    <footer>

    </footer>
</body>
</html>
